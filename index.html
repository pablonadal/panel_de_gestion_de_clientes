<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sitio estatico desplegado</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #5d6b78;
      --paper: #f7f5ef;
      --line: #d8d4ca;
      --accent: #0f766e;
      --accent-2: #b45309;
      --accent-3: #2563eb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--ink);
      background: var(--paper);
      min-height: 100vh;
    }

    main {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, 0.95fr);
      align-items: center;
      gap: 48px;
      width: min(1120px, calc(100% - 40px));
      margin: 0 auto;
      padding: 48px 0;
    }

    .copy {
      display: grid;
      gap: 24px;
      align-content: center;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      gap: 10px;
      padding: 8px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.58);
      font-size: 14px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #16a34a;
      box-shadow: 0 0 0 6px rgba(22, 163, 74, 0.12);
    }

    h1 {
      margin: 0;
      max-width: 760px;
      font-size: clamp(44px, 8vw, 84px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .lead {
      margin: 0;
      max-width: 620px;
      color: var(--muted);
      font-size: 20px;
      line-height: 1.55;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 8px;
      border: 1px solid #0b5f59;
      background: var(--accent);
      color: white;
      font-weight: 700;
      text-decoration: none;
    }

    .hint {
      color: var(--muted);
      font-size: 15px;
    }

    .visual {
      position: relative;
      min-height: 520px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.12), transparent 38%),
        linear-gradient(315deg, rgba(180, 83, 9, 0.14), transparent 42%),
        #fffdf8;
      overflow: hidden;
      box-shadow: 0 24px 70px rgba(23, 32, 42, 0.12);
    }

    .screen {
      position: absolute;
      inset: 46px 34px auto;
      height: 300px;
      border: 1px solid #c8c1b5;
      border-radius: 8px;
      background: #17202a;
      overflow: hidden;
    }

    .screen-bar {
      height: 34px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      background: #25313d;
    }

    .screen-bar span {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f97316;
    }

    .screen-bar span:nth-child(2) { background: #facc15; }
    .screen-bar span:nth-child(3) { background: #22c55e; }

    .code {
      padding: 26px;
      display: grid;
      gap: 14px;
    }

    .code-line {
      height: 12px;
      border-radius: 999px;
      background: #d8f3ef;
      opacity: 0.9;
    }

    .code-line:nth-child(2) { width: 72%; background: #fed7aa; }
    .code-line:nth-child(3) { width: 86%; background: #bfdbfe; }
    .code-line:nth-child(4) { width: 54%; }

    .network {
      position: absolute;
      left: 34px;
      right: 34px;
      bottom: 34px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .tile {
      min-height: 116px;
      border: 1px solid #d8d4ca;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      padding: 16px;
      display: grid;
      align-content: space-between;
    }

    .icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
      background: var(--accent);
    }

    .tile:nth-child(2) .icon { background: var(--accent-2); }
    .tile:nth-child(3) .icon { background: var(--accent-3); }
    .tile strong { font-size: 15px; }

    @media (max-width: 840px) {
      main { grid-template-columns: 1fr; gap: 28px; padding: 28px 0; }
      .visual { min-height: 460px; }
    }

    @media (max-width: 560px) {
      main { width: min(100% - 28px, 1120px); }
      h1 { font-size: 44px; }
      .lead { font-size: 18px; }
      .screen { inset: 24px 18px auto; }
      .network { left: 18px; right: 18px; grid-template-columns: 1fr; }
      .tile { min-height: 84px; grid-template-columns: auto 1fr; align-items: center; gap: 12px; }
    }
  </style>
</head>
<body>
  <main>
    <section class="copy" aria-label="Estado del sitio">
      <div class="eyebrow"><span class="dot"></span> GitHub Pages activo</div>
      <h1>Pagina estatica desplegada</h1>
      <p class="lead">Este sitio fue publicado en GitHub Pages desde la cuenta pablonadal. Es una pagina HTML y CSS servida publicamente desde GitHub.</p>
      <div class="actions">
        <a class="button" href="./">Recargar sitio</a>
        <span class="hint">HTML y CSS en un solo archivo</span>
      </div>
    </section>

    <section class="visual" aria-label="Ilustracion del despliegue">
      <div class="screen">
        <div class="screen-bar"><span></span><span></span><span></span></div>
        <div class="code" aria-hidden="true">
          <div class="code-line"></div>
          <div class="code-line"></div>
          <div class="code-line"></div>
          <div class="code-line"></div>
        </div>
      </div>
      <div class="network">
        <div class="tile"><div class="icon">GH</div><strong>Repositorio</strong></div>
        <div class="tile"><div class="icon">IP</div><strong>Pages</strong></div>
        <div class="tile"><div class="icon">OK</div><strong>Disponible</strong></div>
      </div>
    </section>
  </main>
</body>
</html>
